<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Trading Pro v4</title>

<!-- Theme -->
<meta name="theme-color" content="#0f0f0f">

<!-- CSS -->
<link rel="stylesheet" href="/static/style.css">

<!-- Chart Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
/* SAFE fallback styling so UI never looks blank */

body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    padding: 12px;
}

#clock {
    font-size: 18px;
    margin: 10px 0;
}

.trend-box {
    padding: 8px;
    background: #1a1a1a;
    margin: 8px 0;
}

.rsi-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

#rsiFill {
    height: 100%;
    width: 50%;
    background: orange;
    transition: 0.3s;
}

.chart-card {
    margin-top: 10px;
}

#tradingview_chart {
    width: 100%;
    height: 320px;
    background: #111;
}

.signal-card {
    margin-top: 10px;
    padding: 10px;
    background: #1a1a1a;
    border-radius: 6px;
}

.history {
    margin-top: 10px;
    padding: 10px;
    background: #111;
    max-height: 200px;
    overflow-y: auto;
}

#historyLog div {
    font-size: 12px;
    border-bottom: 1px solid #222;
    padding: 3px 0;
}
</style>

</head>

<body>

<div class="container">

    <h2>AI Trading Pro v4</h2>

    <!-- CLOCK -->
    <div id="clock">00:00:00</div>

    <!-- TREND -->
    <div class="trend-box" id="trendBox">TREND: --</div>

    <!-- RSI BAR -->
    <div class="rsi-bar">
        <div id="rsiFill"></div>
    </div>

    <!-- ASSET SELECT -->
    <div class="info-card">
        <select id="asset" onchange="changeAsset()">
            <option>EUR/USD</option>
            <option>GBP/USD</option>
            <option>USD/JPY</option>
            <option>BTC/USD</option>
            <option>ETH/USD</option>
            <option>XAU/USD</option>
        </select>
    </div>

    <!-- CHART -->
    <div class="chart-card">
        <div id="tradingview_chart" style="height:320px;"></div>
    </div>

    <!-- SIGNAL -->
    <div class="signal-card">

        <h3 id="signalBox">SIGNAL : WAITING</h3>

        <p id="conf">Confidence : --</p>

        <p id="candle">Candle Ends : 00:59</p>

    </div>

    <!-- HISTORY -->
    <div class="history">
        <h4>Signal History</h4>
        <div id="historyLog"></div>
    </div>

</div>

<!-- JS -->
<script src="/static/script.js" defer></script>

</body>
            </html>
