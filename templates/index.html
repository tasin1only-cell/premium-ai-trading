<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Trading Pro v4</title>

<!-- FIXED PATH -->
<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<div class="container">

<h2>AI Trading Pro v4</h2>

<div id="clock">00:00:00</div>

<div class="trend-box" id="trendBox">TREND: --</div>

<div class="rsi-bar">
  <div id="rsiFill"></div>
</div>

<div class="info-card">

  <select id="asset" onchange="changeAsset()">
    <option>EUR/USD</option>
    <option>GBP/USD</option>
    <option>USD/JPY</option>
    <option>BTC/USD</option>
    <option>ETH/USD</option>
    <option>XAU/USD</option>
  </select>

</div>

<!-- REAL CANDLESTICK CHART -->
<div class="chart-card">
  <div id="tradingview_chart"></div>
</div>

<div class="signal-card">

  <h3 id="signalBox">SIGNAL : WAITING</h3>
  <p id="conf">Confidence : --</p>
  <p id="candle">Candle Ends : 00:59</p>

</div>

<div class="history">
  <h4>Signal History</h4>
  <div id="historyLog"></div>
</div>

</div>

<!-- FIXED JS PATH -->
<script src="/static/script.js"></script>

</body>
</html>
