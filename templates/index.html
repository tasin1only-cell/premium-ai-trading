<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Trading Pro v4</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body { margin:0; background:#0f0f0f; color:white; font-family:Arial; }
.container { padding:12px; }

#clock { font-size:18px; margin:10px 0; }

.box {
    background:#1a1a1a;
    padding:8px;
    margin:6px 0;
    border-radius:6px;
}

.rsi-bar {
    width:100%;
    height:10px;
    background:#333;
    border-radius:5px;
    overflow:hidden;
}

#rsiFill {
    height:100%;
    width:50%;
    background:orange;
    transition:0.3s;
}

#tradingview_chart {
    width:100%;
    height:320px;
    background:#111;
}

.history {
    margin-top:10px;
    background:#111;
    padding:10px;
    max-height:200px;
    overflow-y:auto;
}

#historyLog div {
    font-size:12px;
    border-bottom:1px solid #222;
    padding:3px;
}

.label {
    font-size:13px;
    opacity:0.8;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Trading Pro v4</h2>

<div id="clock">00:00:00</div>

<div class="box" id="trendBox">TREND: --</div>

<div class="box" id="signalBox">SIGNAL: --</div>

<div class="box" id="conf">Confidence: --</div>

<div class="box label" id="marketBox">Market: --</div>
<div class="box label" id="riskBox">Risk: --</div>
<div class="box label" id="probBox">Probability: --</div>
<div class="box label" id="strengthBox">Strength: --</div>

<div class="rsi-bar">
    <div id="rsiFill"></div>
</div>

<br>

<select id="asset">
<option>EUR/USD</option>
<option>GBP/USD</option>
<option>USD/JPY</option>
<option>BTC/USD</option>
<option>ETH/USD</option>
<option>XAU/USD</option>
</select>

<div id="tradingview_chart"></div>

<div class="box" id="candle">Candle Ends: 00:59</div>

<div class="history">
<h4>History</h4>
<div id="historyLog"></div>
</div>

</div>

<script src="/static/script.js" defer></script>

</body>
</html>
