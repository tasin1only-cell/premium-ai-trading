<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Trading Pro v4</title>

<!-- ✅ Flask STATIC FIX -->
<link rel="stylesheet" href="/static/style.css">

<!-- Chart Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body>

<div class="container">

    <h2>AI Trading Pro v4</h2>

    <!-- CLOCK -->
    <div id="clock">00:00:00</div>

    <!-- TREND -->
    <div class="trend-box" id="trendBox">TREND: --</div>

    <!-- RSI BAR -->
    <div class="rsi-bar">
        <div id="rsiFill"></div>
    </div>

    <!-- ASSET SELECT -->
    <div class="info-card">
        <select id="asset" onchange="changeAsset()">
            <option>EUR/USD</option>
            <option>GBP/USD</option>
            <option>USD/JPY</option>
            <option>BTC/USD</option>
            <option>ETH/USD</option>
            <option>XAU/USD</option>
        </select>
    </div>

    <!-- CHART -->
    <div class="chart-card">
        <div id="tradingview_chart"></div>
    </div>

    <!-- SIGNAL BOX -->
    <div class="signal-card">

        <h3 id="signalBox">SIGNAL : WAITING</h3>

        <p id="conf">Confidence : --</p>

        <p id="candle">Candle Ends : 00:59</p>

    </div>

    <!-- HISTORY -->
    <div class="history">
        <h4>Signal History</h4>
        <div id="historyLog"></div>
    </div>

</div>

<!-- ✅ STATIC JS FIX -->
<script src="/static/script.js" defer></script>

</body>
</html>
